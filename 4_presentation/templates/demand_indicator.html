<section class="demand-indicator panel">
  <div class="section-header">
    <h2>Indicador de demanda</h2>
    <p>Estado del modelo en una sola mirada.</p>
  </div>
  <div class="card demand-card">
    <div class="demand-header">
      <span class="demand-label">Demanda actual</span>
      <span class="demand-badge" id="demandBadge">Sin data</span>
    </div>
    <div class="demand-bar">
      <div class="demand-fill" id="demandFill"></div>
    </div>
    <div class="demand-foot" id="demandFoot">Selecciona un modelo para ver su demanda.</div>
  </div>
</section>
